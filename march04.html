<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reincarnation Balance Patch</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;800&family=Noto+Sans:wght@300;400;700&display=swap"
        rel="stylesheet">
        <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;800&family=Noto+Sans:wght@300;400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --glass-blur: 16px;
            --glass-bg: rgba(25, 30, 40, 0.6);
            --glass-border: rgba(255, 255, 255, 0.05);
            --tooltip-bg: rgba(0, 0, 0, 0.9);
            --text-color: #ffffff;
            --buff-color: #00ff9d;
            --nerf-color: #ff3c3c;
            --balance-color: #40c4ff;
            --sub-header: #a1a9b4;
            --font-main: 'Noto Sans', sans-serif;
            --font-heading: 'Montserrat', sans-serif;
            --bg-color: #0b101a;
            --primary-accent: #40c4ff;
        }

        body {
            margin: 0;
            padding: 0;
            background-color: var(--bg-color);
            background-image:
                radial-gradient(circle at 30% 30%, rgba(64, 196, 255, 0.1) 0%, transparent 40%),
                radial-gradient(circle at 70% 70%, rgba(255, 255, 255, 0.05) 0%, transparent 40%),
                radial-gradient(circle at center, #1b263b 0%, #0b101a 100%);
            background-attachment: fixed;
            min-height: 100vh;
            color: var(--text-color);
            font-family: var(--font-main);
            display: flex;
            flex-direction: column;
            align-items: center;
            padding-top: 110px;
        }

        /* CONTROLS *//* CONTROLS */
        .controls {
            margin-bottom: 20px;
            background: rgba(0, 0, 0, 0.8);
            padding: 10px 20px;
            border-radius: 10px;
            border: 1px solid rgba(255, 255, 255, 0.2);
            backdrop-filter: blur(5px);
            display: flex;
            align-items: center;
            flex-wrap: wrap;
            gap: 15px;
            z-index: 1000;
        }

        .control-group {
            display: flex;
            align-items: center;
            gap: 8px;
            border-right: 1px solid rgba(255, 255, 255, 0.2);
            padding-right: 15px;
        }

        .control-group:last-child {
            border-right: none;
        }

        .control-label {
            font-size: 0.8rem;
            color: #aaa;
            text-transform: uppercase;
        }

        input[type="file"] {
            color: #ccc;
            font-size: 0.85rem;
            max-width: 180px;
        }

        input[type="range"] {
            cursor: pointer;
        }

        .btn {
            border: none;
            color: white;
            padding: 8px 16px;
            border-radius: 20px;
            font-weight: bold;
            cursor: pointer;
            transition: transform 0.2s;
            font-size: 0.85rem;
        }

        .btn-export {
            background: linear-gradient(45deg, #007bff, #00d2ff);
        }

        .btn-png {
            background: linear-gradient(45deg, #ff9d00, #ff5e00);
        }

        .btn:hover {
            transform: scale(1.05);
        }

        /* GRID (3 Columns) */
        .container {
            width: 95%;
            max-width: 1400px;
            display: grid;
            grid-template-columns: 1fr 1fr 1fr;
            gap: 20px;
            padding-bottom: 50px;
        }

        .panel {
            background: var(--glass-bg);
            backdrop-filter: blur(var(--glass-blur));
            -webkit-backdrop-filter: blur(var(--glass-blur));
            border: 1px solid var(--glass-border);
            border-radius: 16px;
            padding: 20px;
            min-height: 400px;
            display: flex;
            flex-direction: column;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
            transition: backdrop-filter 0.2s;
        }

        h2 {
            margin-top: 0;
            text-transform: uppercase;
            font-family: var(--font-heading);
            font-weight: 800;
            font-size: 1.2rem;
            letter-spacing: 2px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
            padding-bottom: 10px;
            display: flex;
            align-items: center;
            gap: 10px;
            color: #fff;
        }

        .icon-symbol {
            margin-right: 10px;
            font-size: 1.5rem;
        }

        .buff h2 {
            margin-top: 0;
            text-transform: uppercase;
            font-family: var(--font-heading);
            font-weight: 800;
            font-size: 1.2rem;
            letter-spacing: 2px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
            padding-bottom: 10px;
            display: flex;
            align-items: center;
            gap: 10px;
            color: #fff;
        }

        .nerf h2 {
            margin-top: 0;
            text-transform: uppercase;
            font-family: var(--font-heading);
            font-weight: 800;
            font-size: 1.2rem;
            letter-spacing: 2px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
            padding-bottom: 10px;
            display: flex;
            align-items: center;
            gap: 10px;
            color: #fff;
        }

        .balance h2 {
            margin-top: 0;
            text-transform: uppercase;
            font-family: var(--font-heading);
            font-weight: 800;
            font-size: 1.2rem;
            letter-spacing: 2px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
            padding-bottom: 10px;
            display: flex;
            align-items: center;
            gap: 10px;
            color: #fff;
        }

        .section-label {
            font-size: 0.8rem;
            font-weight: bold;
            color: var(--sub-header);
            text-transform: uppercase;
            margin: 15px 0 10px 0;
            border-bottom: 1px dashed rgba(255, 255, 255, 0.1);
            padding-bottom: 5px;
        }

        .hero-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(80px, 1fr));
            gap: 25px;
            margin-bottom: 10px;
        }

        .hero-card {
            display: flex;
            flex-direction: column;
            align-items: center;
            position: relative;
            transition: transform 0.2s;
            cursor: help;
        }

        .hero-card:hover {
            transform: scale(1.1);
            z-index: 50;
        }

        .hero-img-wrapper {
            width: 70px;
            height: 70px;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .hero-img-wrapper img {
            width: 100%;
            height: 100%;
            object-fit: contain;
            filter: drop-shadow(0px 2px 3px rgba(0, 0, 0, 0.5));
        }

        .hero-name {
            font-weight: 700;
            font-family: var(--font-heading);
            font-size: 0.95rem;
            color: var(--text-color);
            letter-spacing: 1px;
            text-transform: uppercase;
            text-align: center;
            margin-top: 8px;
            line-height: 1.2;
        }

        /* MODAL STYLES */
        .modal {
            display: none;
            position: fixed;
            z-index: 5000;
            left: 0;
            top: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0, 0, 0, 0.8);
            backdrop-filter: blur(5px);
            justify-content: center;
            align-items: center;
            opacity: 0;
            transition: opacity 0.3s ease;
        }

        .modal.show {
            display: flex;
            opacity: 1;
        }

        .modal-content {
            background: var(--glass-bg);
            border: 1px solid var(--glass-border);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            padding: 30px;
            border-radius: 16px;
            width: 90%;
            max-width: 600px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.5);
            position: relative;
            transform: scale(0.9);
            transition: transform 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            color: var(--text-color);
            display: flex;
            flex-direction: column;
            max-height: 80vh;
        }

        .modal.show .modal-content {
            transform: scale(1);
        }

        .close-btn {
            position: absolute;
            top: 15px;
            right: 20px;
            color: #aaa;
            font-size: 28px;
            font-weight: bold;
            cursor: pointer;
            transition: color 0.2s;
            z-index: 10;
        }

        .close-btn:hover {
            color: white;
        }

        .modal-header {
            display: flex;
            align-items: center;
            gap: 20px;
            margin-bottom: 20px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
            padding-bottom: 15px;
            flex-shrink: 0;
        }

        .modal-header img {
            width: 80px;
            height: 80px;
            object-fit: contain;
            border-radius: 12px;
            background: rgba(0, 0, 0, 0.3);
            padding: 5px;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .modal-title-group {
            display: flex;
            flex-direction: column;
        }

        .modal-header h2 {
            margin-top: 0;
            text-transform: uppercase;
            font-family: var(--font-heading);
            font-weight: 800;
            font-size: 1.2rem;
            letter-spacing: 2px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
            padding-bottom: 10px;
            display: flex;
            align-items: center;
            gap: 10px;
            color: #fff;
        }

        .modal-id {
            font-size: 0.9rem;
            color: #aaa;
            margin-top: 4px;
        }

        .modal-body {
            white-space: pre-wrap;
            line-height: 1.6;
            font-size: 1.05rem;
            overflow-y: auto;
            padding-right: 10px;
            flex-grow: 1;
        }

        /* Scrollbar */
        .modal-body::-webkit-scrollbar {
            width: 8px;
        }

        .modal-body::-webkit-scrollbar-track {
            background: rgba(0, 0, 0, 0.2);
            border-radius: 4px;
        }

        .modal-body::-webkit-scrollbar-thumb {
            background: rgba(255, 255, 255, 0.2);
            border-radius: 4px;
        }

        .modal-body::-webkit-scrollbar-thumb:hover {
            background: rgba(255, 255, 255, 0.4);
        }
    
        /* Navbar */
        .navbar {
            position: fixed;
            top: 0;
            width: 100%;
            height: 70px;
            background: rgba(11, 16, 26, 0.75);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 60px;
            box-sizing: border-box;
            z-index: 10000;
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
        }

        .nav-logo {
            font-family: var(--font-heading);
            font-size: 1.6rem;
            font-weight: 800;
            letter-spacing: 2px;
            color: #fff;
            text-decoration: none;
            display: flex;
            align-items: center;
        }

        .nav-logo span {
            color: var(--primary-accent);
        }

        .nav-links {
            display: flex;
            gap: 40px;
        }

        .nav-link {
            color: #e0e5ed;
            text-decoration: none;
            font-size: 0.95rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 1px;
            position: relative;
            padding: 25px 0;
            transition: color 0.3s ease;
        }

        .nav-link:hover,
        .nav-link.active {
            color: #fff;
        }

        .nav-link::after {
            content: '';
            position: absolute;
            bottom: 0;
            left: 50%;
            transform: translateX(-50%);
            width: 0;
            height: 3px;
            background-color: var(--primary-accent);
            transition: width 0.3s ease;
        }

        .nav-link:hover::after,
        .nav-link.active::after {
            width: 100%;
        }

    
        /* Dropdown CSS */
        .nav-dropdown {
            position: relative;
            display: flex;
            align-items: center;
            height: 100%;
        }

        .dropdown-content {
            display: none;
            position: absolute;
            background: rgba(11, 16, 26, 0.95);
            min-width: 160px;
            box-shadow: 0 8px 16px rgba(0, 0, 0, 0.4);
            border: 1px solid rgba(255, 255, 255, 0.05);
            border-radius: 8px;
            padding: 10px 0;
            z-index: 1000;
            top: 100%;
            left: 50%;
            transform: translateX(-50%);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            opacity: 0;
            transition: opacity 0.3s ease;
        }

        .nav-dropdown:hover .dropdown-content {
            display: block;
            opacity: 1;
        }

        .dropdown-content a {
            color: #e0e5ed;
            padding: 12px 20px;
            text-decoration: none;
            display: block;
            font-size: 0.9rem;
            text-align: center;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 1px;
            transition: all 0.2s ease;
        }

        .dropdown-content a:hover {
            color: #ffffff;
            background: rgba(64, 196, 255, 0.1);
        }

    </style>
<style>.controls { display: none !important; }</style>
</head>

<body>
    <!-- Navigation Bar -->
    <div class="navbar">
        <a href="index.html" class="nav-logo">REINCAR<span>NATION</span></a>
        <div class="nav-links">
            <a href="index.html" class="nav-link">Home</a>
            <a href="news.html" class="nav-link">News</a>
                        <div class="nav-dropdown">
                <a href="index.html#info" class="nav-link dropbtn">Game Info</a>
                <div class="dropdown-content">
                    <a href="medals.html">Medals</a>
                </div>
            </div>
        </div>
    </div>

    <div class="controls" id="control-panel">
        <div class="control-group">
            <span class="control-label">Load Data:</span>
            <input type="file" id="jsonInput" accept=".json">
        </div>

        <div class="control-group">
            <span class="control-label">Background:</span>
            <input type="file" id="bgInput" accept="image/*">
        </div>

        <div class="control-group">
            <span class="control-label">Glass Blur:</span>
            <input type="range" id="blurInput" min="0" max="40" value="16">
        </div>

        <div class="control-group">
            <button class="btn btn-export" onclick="exportStandalone()">Save HTML</button>
            <button class="btn btn-png" onclick="saveAsPng()">Save PNG</button>
        </div>
    </div>

    <div class="container">
        <div class="panel buff"></div>
        <div class="panel nerf"></div>
        <div class="panel balance"></div>
    </div>

    <!-- MODAL -->
    <div id="infoModal" class="modal">
        <div class="modal-content">
            <span class="close-btn">&times;</span>
            <div class="modal-header">
                <img id="modal-img" src="" alt="Icon">
                <div class="modal-title-group">
                    <h2 id="modal-title">Hero Name</h2>
                </div>
            </div>
            <div class="modal-body" id="modal-text">
                <!-- Content goes here -->
            </div>
        </div>
    </div>

    <script>
        let currentData = {
    "buff": [
        {
            "name": "Secret Esper Trinket",
            "id": "311147",
            "type_prefix": "clo",
            "folder": "item",
            "message": "Increased recovery per tick (0.25 -> 0.5)\nTick decreased (500 -> 300)",
            "custom_icon": "images/311147_Secret Esper Trinket.png"
        },
        {
            "name": "Galaxy Mage",
            "id": "118",
            "type_prefix": "char",
            "folder": "class",
            "message": "Dash Attack speed increased (0.75 -> 0.5)\nJump rotate attack enabled\nDouble jump enabled\nHold D movement speed decrease percentage decreased (from 50% to 30%)\nHold D gauge increase tick increased (75 -> 100)\nHold D State: Enabled double jump",
            "custom_icon": "images/118_Galaxy Mage.png"
        },
        {
            "name": "Magic Lancer",
            "id": "43",
            "type_prefix": "char",
            "folder": "class",
            "message": "Final dash hit is now a GB",
            "custom_icon": "images/43_Magic Lancer.png"
        }
    ],
    "nerf": [
        {
            "name": "Space Dominator Cloak",
            "id": "311244",
            "type_prefix": "clo",
            "folder": "item",
            "message": "Invincible frames decreased (1.5s -> 0.7s)\nMove range decreased to magic circle view (2000 -> 1250)\nMove speed decreased; magic circle speed untouched (1000 -> 500)",
            "custom_icon": "images/311244_Space Dominator Cloak.png"
        }
    ],
    "balance": [
        {
            "name": "Swordsman Baek",
            "id": "52",
            "type_prefix": "char",
            "folder": "class",
            "message": "<Rework>\nBasics:\nBasic Attack speed increased (10% faster/delay from 300 -> 50)\n4th Basic Attack now pushes enemy further\n\nCounter/Block:\nFake-out added (false counter)\nCounter attack changed to \"Lee\" type\nGuard roll added\nDeflect added\n\nDash: \nAdded dash roll on basic attacks, defense and hold D\nSequence changed from dash attacks, now separated into Dash Attack and Extended Dash Attack\n(Before): Dash + D (1st hit) + D (2nd hit)\n(After): Dash + D (1st hit; allow roll out), Dash + Hold D for GB (2nd hit; allow roll out)\n\nHold D:\nHold D no longer needs charge up time for maximum distance\nCan no longer roll after Hold D",
            "custom_icon": "images/52_Swordsman Baek.png"
        }
    ]
};

        function padId(id) { return id.toString().padStart(3, '0'); }

        function getImageUrl(item) {
            if (item.custom_icon) {
                return item.custom_icon;
            }
            const folder = item.folder || "class";
            const prefix = item.type_prefix || "char";
            const middle = (folder === "item") ? `item_${prefix}` : prefix;
            return `https://lostsagakr-cdn-image.valofe.com/2014_grand/${folder}/thum/thum_${middle}_${padId(item.id)}_o.jpg`;
        }

        function createHeroCard(item, categoryId) {
            const card = document.createElement('div');
            card.className = 'hero-card';
            let html = `
                <div class="hero-img-wrapper">
                    <img src="${getImageUrl(item)}" alt="${item.name}" onerror="this.src='https://via.placeholder.com/70?text=Err'">
                </div>
                <div class="hero-name">${item.name}</div>
            `;
            // Removed tooltip generation
            card.innerHTML = html;

            // Add click event for modal
            if (item.message && item.message.trim() !== "") {
                card.onclick = () => openModal(item, categoryId);
                card.style.cursor = 'pointer'; // Reinforce pointer cursor
            } else {
                card.style.cursor = 'default';
            }

            return card;
        }

        // --- MODAL LOGIC ---
        const modal = document.getElementById("infoModal");
        const closeBtn = document.querySelector(".close-btn");
        const modalTitle = document.getElementById("modal-title");
        const modalImg = document.getElementById("modal-img");
        const modalText = document.getElementById("modal-text");

        function openModal(item, categoryId) {
            modalTitle.innerText = item.name;
            modalText.innerText = item.message;
            modalImg.src = getImageUrl(item);

            // Colorize title based on category
            if (categoryId === 'buff') modalTitle.style.color = "var(--buff-color)";
            else if (categoryId === 'nerf') modalTitle.style.color = "var(--nerf-color)";
            else if (categoryId === 'balance') modalTitle.style.color = "var(--balance-color)";
            else modalTitle.style.color = "#fff";

            modal.classList.add("show");
        }

        function closeModal() {
            modal.classList.remove("show");
        }

        closeBtn.onclick = closeModal;

        window.onclick = function (event) {
            if (event.target == modal) {
                closeModal();
            }
        }

        // ESC key to close
        document.addEventListener('keydown', function (event) {
            if (event.key === "Escape") {
                closeModal();
            }
        });

        function renderAll(data) {
            currentData = data;

            const categories = [
                { id: "buff", icon: "▲", title: "Buff" },
                { id: "nerf", icon: "▼", title: "Nerf" },
                { id: "balance", icon: "⚔", title: "Balance" }
            ];

            categories.forEach(cat => {
                const panel = document.querySelector(`.panel.${cat.id}`);
                panel.innerHTML = `<h2><span class="icon-symbol">${cat.icon}</span> ${cat.title}</h2>`;

                if (!data[cat.id] || data[cat.id].length === 0) return;

                // Sort by ID
                const sortedItems = [...data[cat.id]].sort((a, b) => parseInt(a.id) - parseInt(b.id));

                // Group items
                const groups = {
                    "Heroes": [],
                    "Weapons": [],
                    "Armors": [],
                    "Helmets": [],
                    "Trinkets": []
                };

                sortedItems.forEach(item => {
                    const prefix = item.type_prefix || "char";
                    if (prefix === "char") groups["Heroes"].push(item);
                    else if (prefix === "wes") groups["Weapons"].push(item);
                    else if (prefix === "ama") groups["Armors"].push(item);
                    else if (prefix === "hoo") groups["Helmets"].push(item);
                    else if (prefix === "clo") groups["Trinkets"].push(item);
                    else groups["Heroes"].push(item); // Fallback
                });

                // Render Groups
                Object.keys(groups).forEach(groupName => {
                    const items = groups[groupName];
                    if (items.length > 0) {
                        // Section Label
                        const label = document.createElement('div');
                        label.className = 'section-label';
                        label.innerText = groupName;
                        panel.appendChild(label);

                        // Grid
                        const grid = document.createElement('div');
                        grid.className = 'hero-grid';

                        items.forEach(item => {
                            grid.appendChild(createHeroCard(item, cat.id));
                        });

                        panel.appendChild(grid);
                    }
                });
            });
        }

        function exportStandalone() {
            let html = document.documentElement.outerHTML;
            const script = `let currentData = ${JSON.stringify(currentData, null, 4)};`;
            html = html.replace(/let currentData = \{[\s\S]*?\};/, script);
            const blob = new Blob([html], { type: "text/html" });
            const a = document.createElement('a');
            a.href = URL.createObjectURL(blob);
            a.download = "balance_patch.html";
            a.click();
        }

        function saveAsPng() {
            const c = document.getElementById('control-panel');
            c.style.display = 'none';
            html2canvas(document.body, { backgroundColor: null, scale: 2, useCORS: true }).then(canvas => {
                const a = document.createElement('a');
                a.download = 'balance_patch.png';
                a.href = canvas.toDataURL("image/png");
                a.click();
                c.style.display = 'flex';
            });
        }

        // --- Event Listeners ---

        // 1. JSON Load
        document.getElementById('jsonInput').addEventListener('change', e => {
            const f = e.target.files[0];
            if (f) {
                const r = new FileReader();
                r.onload = ev => renderAll(JSON.parse(ev.target.result));
                r.readAsText(f);
            }
        });

        // 2. Background Upload
        document.getElementById('bgInput').addEventListener('change', e => {
            const f = e.target.files[0];
            if (f) {
                const url = URL.createObjectURL(f);
                document.body.style.backgroundImage = `url('${url}')`;
            }
        });

        // 3. Blur Slider
        document.getElementById('blurInput').addEventListener('input', e => {
            document.documentElement.style.setProperty('--glass-blur', e.target.value + 'px');
        });

        renderAll(currentData);
    </script>
