            height: 100%;
            background-color: rgba(0, 0, 0, 0.8);
            backdrop-filter: blur(5px);
            justify-content: center;
            align-items: center;
            opacity: 0;
            transition: opacity 0.3s ease;

            display: flex;
            opacity: 1;
        }

            background: var(--glass-bg);

            transform: scale(0.9);

            color: var(--text-color);
            display: flex;
            flex-direction: column;
            max-height: 80vh;
        }
        .modal.show .modal-content {
            transform: scale(1);
        }

            top: 15px;
            right: 20px;
            color: #aaa;
            font-size: 28px;
            font-weight: bold;
            cursor: pointer;

                    "message": "Nerf: Basic Attack (D-D-D) damage: 10 \u2794 7.\nNerf: Hold D damage: 12 \u2794 9.",
                    "custom_icon": "images/114_Titan.png"
                },
                {
                    "name": "R-Cyber Medic",
                    "id": "505",
                    "type_prefix": "char",
                    "folder": "class",
                    "message": "(SD) Stat Growth: Attack \u2794 Weapon Skill Cooldown\n(SD) Skill charge to allies reduced by 50% (1000 \u2794 500).\n(ASD) Stun timer increased: 1.25s \u2794 1.5s.\n(AD) Cast time decreased (850 \u2794 350).\n(AD) Passive gear gauge decrease: 50% \u2794 100%.",
                    "custom_icon": "images/505_RCyber Medic.png"
                },
                {
                    "name": "R-Ice Mage",
                    "id": "509",
                    "type_prefix": "char",
                    "folder": "class",
                    "message": "Removed: Equip Buff.\n(SD) Skill Overcharge Added: Blizzard \u2794 R-Blizzard.\n(ASD) Can be used while knocked down; freezes on impact.",
                    "custom_icon": "images/509_RIce Mage.png"
                },
                {
                    "name": "R-Guan Yu",
                    "id": "514",
                    "type_prefix": "char",
                    "folder": "class",
                    "message": "Removed: Equip Buff.",
                    "custom_icon": "images/514_RGuan Yu.png"
                }
            ]
        };
        function padId(id) { return id.toString().padStart(3, '0'); }
        function getImageUrl(item) {
            if (item.custom_icon) {
                return item.custom_icon;
            }
            const folder = item.folder || "class";
            const prefix = item.type_prefix || "char";
            const middle = (folder === "item") ? `item_${prefix}` : prefix;
            return `https://lostsagakr-cdn-image.valofe.com/2014_grand/${folder}/thum/thum_${middle}_${padId(item.id)}_o.jpg`;
        }
        function createHeroCard(item, categoryId) {
            const card = document.createElement('div');
            card.className = 'hero-card';
            let html = `
                <div class="hero-img-wrapper">
                    <img src="${getImageUrl(item)}" alt="${item.name}" onerror="this.src='https://via.placeholder.com/70?text=Err'">
                </div>
                <div class="hero-name">${item.name}</div>
            `;
            // Removed tooltip generation
            card.innerHTML = html;
            // Add click event for modal
            if (item.message && item.message.trim() !== "") {
                card.onclick = () => openModal(item, categoryId);
                card.style.cursor = 'pointer'; // Reinforce pointer cursor
            } else {
                card.style.cursor = 'default';
            }
            return card;
        }
        // --- MODAL LOGIC ---
        const modal = document.getElementById("infoModal");
        const closeBtn = document.querySelector(".close-btn");
        const modalTitle = document.getElementById("modal-title");
        const modalImg = document.getElementById("modal-img");
        const modalText = document.getElementById("modal-text");
        function openModal(item, categoryId) {
            modalTitle.innerText = item.name;
            modalText.innerText = item.message;
            modalImg.src = getImageUrl(item);
            // Colorize title based on category
            if (categoryId === 'buff') modalTitle.style.color = "var(--buff-color)";
            else if (categoryId === 'nerf') modalTitle.style.color = "var(--nerf-color)";
            else if (categoryId === 'balance') modalTitle.style.color = "var(--balance-color)";
            else modalTitle.style.color = "#fff";
            modal.classList.add("show");
        }
        function closeModal() {
            modal.classList.remove("show");
        }
        closeBtn.onclick = closeModal;
        window.onclick = function (event) {
            if (event.target == modal) {
                closeModal();
            }
        }
        // ESC key to close
        document.addEventListener('keydown', function (event) {
            if (event.key === "Escape") {
                closeModal();
            }
        });
        function renderAll(data) {
            currentData = data;
            const categories = [
                { id: "buff", icon: "▲", title: "Buff" },
                { id: "nerf", icon: "▼", title: "Nerf" },
                { id: "balance", icon: "⚔", title: "Balance" }
            ];
            categories.forEach(cat => {
                const panel = document.querySelector(`.panel.${cat.id}`);
                panel.innerHTML = `<h2><span class="icon-symbol">${cat.icon}</span> ${cat.title}</h2>`;
                if (!data[cat.id] || data[cat.id].length === 0) return;
                // Sort by ID
                const sortedItems = [...data[cat.id]].sort((a, b) => parseInt(a.id) - parseInt(b.id));
                // Group items
                const groups = {
                    "Heroes": [],
                    "Weapons": [],
                    "Armors": [],
                    "Helmets": [],
                    "Trinkets": []
                };
                sortedItems.forEach(item => {
                    const prefix = item.type_prefix || "char";
                    if (prefix === "char") groups["Heroes"].push(item);
                    else if (prefix === "wes") groups["Weapons"].push(item);
                    else if (prefix === "ama") groups["Armors"].push(item);
                    else if (prefix === "hoo") groups["Helmets"].push(item);
                    else if (prefix === "clo") groups["Trinkets"].push(item);
                    else groups["Heroes"].push(item); // Fallback
                });
                // Render Groups
                Object.keys(groups).forEach(groupName => {
                    const items = groups[groupName];
                    if (items.length > 0) {
                        // Section Label
                        const label = document.createElement('div');
                        label.className = 'section-label';
                        label.innerText = groupName;
                        panel.appendChild(label);
                        // Grid
                        const grid = document.createElement('div');
                        grid.className = 'hero-grid';
                        items.forEach(item => {
                            grid.appendChild(createHeroCard(item, cat.id));
                        });
                        panel.appendChild(grid);
                    }
                });
            });
        }
        function exportStandalone() {
            let html = document.documentElement.outerHTML;
            const script = `let currentData = ${JSON.stringify(currentData, null, 4)};`;
            html = html.replace(/let currentData = \{[\s\S]*?\};/, script);
            const blob = new Blob([html], { type: "text/html" });
            const a = document.createElement('a');
            a.href = URL.createObjectURL(blob);
            a.download = "balance_patch.html";
            a.click();
        }
        function saveAsPng() {
            const c = document.getElementById('control-panel');
            c.style.display = 'none';
            html2canvas(document.body, { backgroundColor: null, scale: 2, useCORS: true }).then(canvas => {
                const a = document.createElement('a');
                a.download = 'balance_patch.png';
                a.href = canvas.toDataURL("image/png");
                a.click();
                c.style.display = 'flex';
            });
        }
        // --- Event Listeners ---
        // 1. JSON Load
        document.getElementById('jsonInput').addEventListener('change', e => {
            const f = e.target.files[0];
            if (f) {
                const r = new FileReader();
                r.onload = ev => renderAll(JSON.parse(ev.target.result));
                r.readAsText(f);
            }
        });
        // 2. Background Upload
        document.getElementById('bgInput').addEventListener('change', e => {
            const f = e.target.files[0];
            if (f) {
                const url = URL.createObjectURL(f);
                document.body.style.backgroundImage = `url('${url}')`;
            }
        });
        // 3. Blur Slider
        document.getElementById('blurInput').addEventListener('input', e => {
            document.documentElement.style.setProperty('--glass-blur', e.target.value + 'px');
        });
        renderAll(currentData);
    </script>
</body>
</html>
